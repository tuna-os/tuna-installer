name: Flatpak

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.tunaos.Installer.flatpak
          manifest-path: flatpak/org.tunaos.Installer.json
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: org.tunaos.Installer.flatpak
          path: org.tunaos.Installer.flatpak
          retention-days: 30

      - name: Attach bundle to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: org.tunaos.Installer.flatpak
