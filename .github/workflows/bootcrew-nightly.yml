name: Bootcrew Nightly (full install)

on:
  schedule:
    - cron: '0 2 * * 1'   # Weekly, Monday 02:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  # Read the image matrix from tests/bootcrew-matrix.yaml.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Parse image matrix
        id: read-matrix
        run: |
          MATRIX=$(yq -o json tests/bootcrew-matrix.yaml | jq -c '.images')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  full-install:
    name: install / ${{ matrix.image.name }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # All images run even if one fails
      matrix:
        image: ${{ fromJson(needs.setup.outputs.matrix) }}

    defaults:
      run:
        working-directory: fisherman/fisherman

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: fisherman/fisherman/go.sum

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman xfsprogs btrfs-progs cryptsetup-bin ostree qemu-system-x86 ovmf flatpak

      - name: Build fisherman
        run: go build -o /tmp/fisherman ./cmd/fisherman/

      - name: Create loop device (50 GB sparse)
        id: loopdev
        run: |
          TMPFILE=$(mktemp)
          truncate -s 50G "$TMPFILE"
          LOOPDEV=$(sudo losetup --find --show "$TMPFILE")
          echo "loopdev=$LOOPDEV" >> "$GITHUB_OUTPUT"
          echo "tmpfile=$TMPFILE" >> "$GITHUB_OUTPUT"

      - name: Generate recipe
        run: |
          cat > /tmp/recipe.json <<EOF
          {
            "disk": "${{ steps.loopdev.outputs.loopdev }}",
            "filesystem": "${{ matrix.image.filesystem }}",
            "composeFsBackend": ${{ matrix.image.composefs_backend }},
            "unifiedStorage": ${{ matrix.image.unified_storage }},
            "selinuxDisabled": ${{ matrix.image.selinux_disabled }},
            "encryption": {"type": "none"},
            "image": "${{ matrix.image.image }}",
            "hostname": "ci-test",
            "flatpaks": ["org.mozilla.firefox"]
          }
          EOF

      - name: Pre-pull image via podman
        # Pull with podman first so containers-storage is in a consistent state.
        # skopeo copy (used by fisherman) then sees all layers already present and
        # skips them — avoiding a known blob-missing issue on Ubuntu 24.04 runners.
        run: sudo podman pull ${{ matrix.image.image }}

      - name: Run fisherman
        run: sudo /tmp/fisherman /tmp/recipe.json

      - name: Verify installation
        run: |
          LOOPDEV="${{ steps.loopdev.outputs.loopdev }}"
          COMPOSEFS="${{ matrix.image.composefs_backend }}"

          # 1. Check 3-partition layout.
          LABEL_COUNT=$(sudo lsblk -o LABEL "$LOOPDEV" | grep -cE 'EFI-SYSTEM|boot|root' || true)
          if [ "$LABEL_COUNT" -ne 3 ]; then
            echo "FAIL: expected 3 labelled partitions, got $LABEL_COUNT"
            sudo lsblk -o NAME,SIZE,FSTYPE,LABEL "$LOOPDEV"
            exit 1
          fi

          # 2. Mount /boot partition (p2) and verify boot layout.
          BOOT_PART="${LOOPDEV}p2"
          VERIFY_DIR=$(mktemp -d)
          sudo mount "$BOOT_PART" "$VERIFY_DIR"

          # 3. Mount root partition (p3) and verify hostname and Flatpaks.
          ROOT_PART="${LOOPDEV}p3"
          ROOT_DIR=$(mktemp -d)
          sudo mount "$ROOT_PART" "$ROOT_DIR"

          if [ "$COMPOSEFS" = "true" ]; then
            # Composefs-native: verify hostname in sysroot /etc.
            if [ ! -f "$ROOT_DIR/etc/hostname" ]; then
              echo "FAIL: $ROOT_DIR/etc/hostname not found (composefs-native)"
              sudo umount "$ROOT_DIR" || true
              sudo umount "$VERIFY_DIR" || true
              exit 1
            fi
            echo "OK: composefs-native hostname at $ROOT_DIR/etc/hostname"

            # Verify Flatpak (composefs-native: /var is in sysroot)
            FLATPAK_PATH="$ROOT_DIR/var/lib/flatpak"
          else
            # Ostree: verify boot loader entries exist.
            if ! ls "$VERIFY_DIR/loader/entries/"*.conf 1>/dev/null 2>&1; then
              echo "FAIL: no boot loader entries in $VERIFY_DIR/loader/entries/"
              sudo umount "$ROOT_DIR" || true
              sudo umount "$VERIFY_DIR" || true
              exit 1
            fi
            echo "OK: ostree boot loader entries found"

            # Verify Flatpak (ostree: /var is in stateroot)
            FLATPAK_PATH="$ROOT_DIR/ostree/deploy/default/var/lib/flatpak"
          fi

          # Verify Flatpaks exist on the disk.
          if [ ! -d "$FLATPAK_PATH/app/org.mozilla.firefox" ]; then
             echo "FAIL: Flatpak firefox not found at $FLATPAK_PATH"
             sudo find "$FLATPAK_PATH" -maxdepth 3 || true
             sudo umount "$ROOT_DIR" || true
             sudo umount "$VERIFY_DIR" || true
             exit 1
          fi

          # Use flatpak list --installation to verify they are correctly indexed.
          # Note: flatpak list needs the path to be the system repo.
          # We check if the refs show up in the list output.
          LIST_OUT=$(flatpak list --installation="$FLATPAK_PATH" --columns=ref || true)
          if ! echo "$LIST_OUT" | grep -q "org.mozilla.firefox"; then
            echo "FAIL: flatpak list --installation did not show firefox"
            echo "List output: $LIST_OUT"
            sudo umount "$ROOT_DIR" || true
            sudo umount "$VERIFY_DIR" || true
            exit 1
          fi
          echo "OK: Flatpaks verified on disk and in flatpak list"

          sudo umount "$ROOT_DIR"
          sudo rmdir "$ROOT_DIR"
          sudo umount "$VERIFY_DIR"
          sudo rmdir "$VERIFY_DIR"
          echo "PASS: ${{ matrix.image.name }}"

      - name: Patch serial console into bootloader entries
        run: |
          LOOPDEV="${{ steps.loopdev.outputs.loopdev }}"
          patch_entries() {
            local part="$1" label="$2"
            local MNT
            MNT=$(mktemp -d)
            sudo mount "$part" "$MNT" || { echo "Cannot mount $label ($part), skipping"; rmdir "$MNT"; return; }
            local patched=0
            for conf in "$MNT"/loader/entries/*.conf; do
              [ -f "$conf" ] || continue
              # Add console=ttyS0 if missing.
              if ! sudo grep -q "console=ttyS0" "$conf"; then
                sudo sed -i 's/^options /options console=ttyS0,115200 /' "$conf"
                patched=1
              fi
              # Add root=/dev/vda3 if missing: composefs images omit root= and rely
              # on GPT auto-discovery (requires partition type root-x86-64), which
              # won't work because fisherman creates type=linux partitions.
              if ! sudo grep -q "root=" "$conf"; then
                sudo sed -i 's/^options /options root=\/dev\/vda3 /' "$conf"
                patched=1
              fi
              if [ "$patched" -eq 1 ]; then
                echo "Patched ($label): $(basename "$conf")"
                sudo grep "^options" "$conf"
              fi
            done
            [ "$patched" -eq 0 ] && echo "No BLS entries to patch on $label"
            sudo umount "$MNT"
            rmdir "$MNT"
          }
          patch_entries "${LOOPDEV}p1" "EFI"
          patch_entries "${LOOPDEV}p2" "boot"

      - name: Boot verification
        working-directory: ${{ github.workspace }}
        run: |
          LOOPDEV="${{ steps.loopdev.outputs.loopdev }}"
          IMAGE_NAME="${{ matrix.image.name }}"
          LOG="/tmp/boot-$(printf '%s' "$IMAGE_NAME" | tr -cs 'a-zA-Z0-9_-' '_').log"

          OVMF_CODE=$(ls /usr/share/OVMF/OVMF_CODE{_4M,}.fd 2>/dev/null | head -1)
          if [ -z "$OVMF_CODE" ]; then
            echo "FAIL: OVMF_CODE.fd not found"
            ls /usr/share/OVMF/ || true
            exit 1
          fi
          OVMF_SUFFIX=$(basename "$OVMF_CODE" | sed 's/OVMF_CODE//;s/\.fd//')
          OVMF_VARS="/usr/share/OVMF/OVMF_VARS${OVMF_SUFFIX}.fd"
          if [ ! -f "$OVMF_VARS" ]; then
            echo "FAIL: matched $OVMF_CODE but corresponding VARS file $OVMF_VARS not found"
            ls /usr/share/OVMF/ || true
            exit 1
          fi

          echo "Booting $IMAGE_NAME with QEMU+OVMF (timeout 240s)..."
          echo "OVMF_CODE=$OVMF_CODE  OVMF_VARS=$OVMF_VARS"
          sudo timeout 240 qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 2G \
            -drive file="$LOOPDEV",format=raw,if=virtio \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,snapshot=on,file="$OVMF_VARS" \
            -serial mon:stdio \
            -nographic \
            -no-reboot 2>&1 | tee "$LOG"
          QEMU_EXIT=${PIPESTATUS[0]}
          if [ "$QEMU_EXIT" -ne 0 ] && [ "$QEMU_EXIT" -ne 124 ]; then
            echo "FAIL: QEMU exited with unexpected code $QEMU_EXIT"
            tail -20 "$LOG"
            exit 1
          fi

          # "login:" covers images with a getty on ttyS0.
          # "Reached target.*Network" covers images that boot fully but present a
          # firstboot OOBE wizard before a getty (e.g. arch-bootc timezone prompt).
          # Both patterns appear only in real userspace, not in the initrd.
          BOOT_OK=0
          if grep -qE 'login:|Reached target.*(Network Name Lookups|multi-user|graphical)' "$LOG"; then
            BOOT_OK=1
          fi

          # Scan for critical runtime failures even when boot appeared successful.
          # - systemd-coredump: a process crashed and dumped core (e.g. gnome-session)
          # - [FAILED] Failed to start: a systemd unit failed to start
          # - Kernel panic: obvious
          FAILURES=$(grep -E 'systemd-coredump.*dumped core|\[FAILED\] Failed to start|Kernel panic' "$LOG" || true)

          if [ "$BOOT_OK" -eq 0 ]; then
            echo "FAIL: no boot success indicator found for $IMAGE_NAME"
            echo "--- last 50 lines of boot log ---"
            tail -50 "$LOG"
            exit 1
          elif [ -n "$FAILURES" ]; then
            echo "FAIL: boot reached userspace but critical failures detected for $IMAGE_NAME:"
            echo "$FAILURES"
            echo "--- last 50 lines of boot log ---"
            tail -50 "$LOG"
            exit 1
          else
            echo "PASS: boot success, no critical failures for $IMAGE_NAME"
          fi

      - name: Cleanup
        if: always()
        run: |
          sudo losetup -d "${{ steps.loopdev.outputs.loopdev }}" || true
          rm -f "${{ steps.loopdev.outputs.tmpfile }}" || true

      - name: Report result to job summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          IMAGE="${{ matrix.image.name }}"
          echo "| $IMAGE | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
