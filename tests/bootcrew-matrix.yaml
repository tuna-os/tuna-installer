# Bootcrew CI regression test matrix.
# Used by both bootcrew-fast.yml (PR gate) and bootcrew-nightly.yml (full install).
# Add new images here; both workflows pick them up automatically.
images:
  - name: yellowfin-gnome50
    image: ghcr.io/tuna-os/yellowfin:gnome50
    filesystem: xfs
    composefs_backend: false
    unified_storage: false
    selinux_disabled: true

  - name: ubuntu-bootc
    image: ghcr.io/bootcrew/ubuntu-bootc:latest
    filesystem: xfs
    composefs_backend: true
    unified_storage: false
    selinux_disabled: false

  # gnomeos-bootc disabled: consistently fails with missing blob in containers-storage
  # (sha256:6d2d10...) — likely a broken layer in the ghcr.io/bootcrew/gnomeos-bootc image.
  # Re-enable once upstream fixes the image.
  # - name: gnomeos-bootc
  #   image: ghcr.io/bootcrew/gnomeos-bootc:latest
  #   filesystem: xfs
  #   composefs_backend: true
  #   unified_storage: false
  #   selinux_disabled: false

  - name: opensuse-bootc
    image: ghcr.io/bootcrew/opensuse-bootc:latest
    filesystem: xfs
    composefs_backend: true
    unified_storage: false
    selinux_disabled: false

  - name: arch-bootc
    image: ghcr.io/bootcrew/arch-bootc:latest
    filesystem: xfs
    composefs_backend: true
    unified_storage: false
    selinux_disabled: false

  # gentoo-bootc disabled: consistently fails with missing blob in containers-storage
  # (sha256:2443e8...) — likely a broken layer in the ghcr.io/bootcrew/gentoo-bootc image.
  # Re-enable once upstream fixes the image.
  # - name: gentoo-bootc
  #   image: ghcr.io/bootcrew/gentoo-bootc:latest
  #   filesystem: xfs
  #   composefs_backend: true
  #   unified_storage: false
  #   selinux_disabled: false

  - name: debian-bootc
    image: ghcr.io/bootcrew/debian-bootc:latest
    filesystem: xfs
    composefs_backend: true
    unified_storage: false
    selinux_disabled: false

  # frostyard-snowloaded disabled: image bundles an older libostree built without
  # composefs support, but the Ubuntu 24.04 runner has the composefs kernel module
  # loaded. libostree sees composefs available at runtime and tries to use it, then
  # fails with "composefs: enabled at runtime, but support is not compiled in".
  # Re-enable once the image ships a libostree with composefs compiled in.
  # - name: frostyard-snowloaded
  #   image: ghcr.io/frostyard/snowloaded:latest
  #   filesystem: xfs
  #   composefs_backend: false
  #   unified_storage: false
  #   selinux_disabled: false
